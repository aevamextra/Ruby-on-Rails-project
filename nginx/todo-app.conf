# Traditional Nginx reverse proxy for the Rails todo app.
#
# Copy this file on the server:
#   sudo cp nginx/todo-app.conf /etc/nginx/sites-available/todo-app
#   sudo ln -s /etc/nginx/sites-available/todo-app /etc/nginx/sites-enabled/todo-app
#
# Replace the placeholder values before enabling:
#   server_name example.com www.example.com;
#   root /var/www/todo-app/current/public;

upstream todo_app_puma {
  server 127.0.0.1:3000 fail_timeout=0;
}

server {
  listen 80;
  listen [::]:80;

  server_name example.com www.example.com;

  root /var/www/todo-app/current/public;

  access_log /var/log/nginx/todo-app.access.log;
  error_log /var/log/nginx/todo-app.error.log warn;

  client_max_body_size 50M;
  keepalive_timeout 10;

  location = /up {
    proxy_pass http://todo_app_puma;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location ^~ /assets/ {
    gzip_static on;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location ^~ /packs/ {
    gzip_static on;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri @todo_app;
  }

  location @todo_app {
    proxy_pass http://todo_app_puma;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Request-Start "t=${msec}";

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_redirect off;
  }

  error_page 404 /404.html;
  error_page 500 502 503 504 /500.html;
}
